<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
    }
    #history {
      height: 100%;
      overflow-y: auto;
      padding: 8px 10px;
    }
    .item {
      padding: 6px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .meta {
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 4px;
    }
    .text {
      font-size: 13px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .role-user { color: #8ab4ff; }
    .role-assistant { color: #e6e6e6; }
  </style>
</head>
<body>
  <div id="history"></div>

  <script src="history.js"></script>
</body>
</html>
