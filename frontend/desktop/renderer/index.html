<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>灰风</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; height: 100vh; width: 100vw; }
    body { font-family: system-ui, sans-serif; color: #eee; display: flex; flex-direction: column; }
    body[data-drag-fallback="true"] #live2d-area { -webkit-app-region: drag; }

    #live2d-area { flex: 1; position: relative; overflow: hidden; }
    #live2d-canvas { width: 100%; height: 100%; }
    #placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2.5em; opacity: 0.3; pointer-events: none; }
    #status-bar { position: absolute; top: 6px; right: 10px; font-size: 11px; opacity: 0.5; pointer-events: none; }

    #chat-box {
      position: absolute; bottom: 50px; left: 8px; right: 8px;
      max-height: 35%; overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column; gap: 4px;
      pointer-events: none;
      -webkit-app-region: no-drag;
      scrollbar-width: none;
    }
    #chat-box::-webkit-scrollbar { width: 0; height: 0; }
    .msg {
      padding: 5px 8px; border-radius: 8px; max-width: 80%;
      font-size: 13px; line-height: 1.3; pointer-events: auto;
      -webkit-app-region: no-drag;
      backdrop-filter: blur(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.entering { opacity: 0; transform: translateY(6px); }
    .msg.fade-out { opacity: 0; transform: translateY(-6px); }
    .msg.user { align-self: flex-end; background: rgba(58, 134, 255, 0.85); }
    .msg.assistant { align-self: flex-start; background: rgba(45, 45, 68, 0.85); }

    #input-area {
      display: flex; gap: 4px; padding: 6px 8px;
      background: rgba(22, 33, 62, 0.8);
      backdrop-filter: blur(10px);
      -webkit-app-region: no-drag;
    }
    #text-input {
      flex: 1; padding: 6px 8px; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; background: rgba(15, 52, 96, 0.7);
      color: #eee; font-size: 13px; outline: none;
    }
    button {
      padding: 6px 12px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; -webkit-app-region: no-drag;
    }
    #send-btn { background: rgba(58, 134, 255, 0.85); color: #fff; }
    #mic-btn { background: rgba(45, 45, 68, 0.85); color: #fff; min-width: 36px; }
    #mic-btn.recording { background: rgba(230, 57, 70, 0.9); }
  </style>
</head>
<body>
  <div id="live2d-area">
    <canvas id="live2d-canvas"></canvas>
    <div id="placeholder">灰风</div>
    <div id="status-bar">未连接</div>
    <div id="chat-box"></div>
  </div>
  <div id="input-area">
    <button id="mic-btn">MIC</button>
    <input id="text-input" type="text" placeholder="输入消息..." />
    <button id="send-btn">发送</button>
  </div>

  <script src="lib/cubism4.min.js"></script>
  <script src="lib/pixi.min.js"></script>
  <script src="lib/pixi-live2d-display.min.js"></script>
  <script src="socket-client.js"></script>
  <script src="chat-overlay.js"></script>
  <script src="voice-ui.js"></script>
  <script src="live2d-interaction-policy.js"></script>
  <script src="live2d-renderer.js"></script>
</body>
</html>
