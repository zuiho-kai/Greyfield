<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>灰风</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    #live2d-area { flex: 1; position: relative; overflow: hidden; }
    #live2d-canvas { width: 100%; height: 100%; }
    #placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 3em; opacity: 0.3; }
    #chat-box { position: absolute; bottom: 60px; left: 12px; right: 12px; max-height: 40%; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .msg { padding: 6px 10px; border-radius: 8px; max-width: 70%; font-size: 14px; line-height: 1.4; }
    .msg.user { align-self: flex-end; background: #3a86ff; }
    .msg.assistant { align-self: flex-start; background: #2d2d44; }
    #status-bar { position: absolute; top: 8px; right: 12px; font-size: 12px; opacity: 0.6; }
    #input-area { display: flex; gap: 6px; padding: 8px 12px; background: #16213e; }
    #text-input { flex: 1; padding: 8px; border: 1px solid #333; border-radius: 6px; background: #0f3460; color: #eee; font-size: 14px; outline: none; }
    button { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #send-btn { background: #3a86ff; color: #fff; }
    #mic-btn { background: #2d2d44; color: #fff; min-width: 40px; }
    #mic-btn.recording { background: #e63946; }
  </style>
</head>
<body>
  <div id="live2d-area">
    <canvas id="live2d-canvas"></canvas>
    <div id="placeholder">灰风</div>
    <div id="status-bar">未连接</div>
    <div id="chat-box"></div>
  </div>
  <div id="input-area">
    <button id="mic-btn">MIC</button>
    <input id="text-input" type="text" placeholder="输入消息..." />
    <button id="send-btn">发送</button>
  </div>

  <script src="socket-client.js"></script>
  <script src="chat-overlay.js"></script>
  <script src="voice-ui.js"></script>
  <script src="live2d-renderer.js"></script>
</body>
</html>
